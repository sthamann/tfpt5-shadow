# v1.2 FREEZE (2026-07-06, difference-operator upgrade; frozen BEFORE any future
# H3 measurement -- this section is the acceptance protocol for the lab run):
addendum_v1_2:
  primary_metric: >
    Difference operator Delta = R_case - R_hom on the mean-free electrode space
    (NtD is the direct measurement; DtN proxy = pseudoinverse as robustness leg;
    the commutant transfers exactly in the ideal case, verified to 1e-15).
    A_on = sum_r ||P_r Delta P_r||^2, A_off = sum_{r!=s} ||P_r Delta P_s||^2,
    f_forbid = A_off/(A_on+A_off) (atlas descriptor). PASS/FAIL dial = ABSOLUTE
    forbidden leakage over the split-half noise floor:
    leak(m) = sqrt(A_off_m(Delta)/A_off_m(Delta_noise)); C_m holds if leak(m) < 3,
    broken if >= 10, ambiguous in between. Rationale (v1.2 lesson, on record): a
    dominant rotation-invariant component dilutes the FRACTION while the
    anisotropic part still leaks -- the fraction alone is the wrong dial.
  group_fingerprint: >
    leak profile under C2/C4/C8/C16. H3 class = Delta visible (>=10x floor) AND
    C4 holds AND C8 broken -- a centered ring passes C8 too and can never fake
    a positive; a generic target breaks C4 already.
  clock_recovery: >
    Leakage L(k) over all 15 electrode rotations; for the H3 target the minima
    must sit at k in {4, 8, 12} (pi/2 orbit), READ OFF the operator, not assumed.
  reflection: >
    D4 face (Theta rho Theta = rho^-1, v196): min over the 16 dihedral axes of
    ||sigma Delta sigma - Delta||/||Delta|| must reach the floor for an aligned
    square (axis scanned, orientation recorded).
  scaling_law: >
    For small controlled mu4 breaking delta, the forbidden ENERGY leakage scales
    quadratically: A_off ~ delta^2 (verified on the simulation contract: exponent
    1.998 over eps = 1e-3..3.2e-2). The lab break-ladder must reproduce this.
  floor_caveat: >
    The split-half floor is a LOWER bound (injection noise only); between-session
    systematics (refill, temperature, contact drift) are NOT in it -- the v1.2
    archive run shows near-invariant rings at leak 4-6x (ambiguous zone). The H3
    protocol therefore REQUIRES repeat homogeneous measurements (same session and
    across sessions) to calibrate the true reproducibility floor.
  blind_protocol: >
    20-40 measurements in random order; the pipeline receives only currents and
    voltages (no photos, no labels) and must classify each case into
    {homogeneous-like, rotation-invariant-like, C4-POSITIVE, C2-symmetric,
    generic-anisotropic, ambiguous} using the frozen scores: rank(patterns)=15,
    reciprocity, |Delta|/floor, leak(C2/C4/C8/C16), NtD-vs-DtN agreement,
    reflection score, clock-recovery minima. Unblinding only after score lock.
  break_ladder: >
    Measurement series: homogeneous / 1 off-center cylinder / 2 opposite /
    4 identical at j*pi/2 / 4 with one rotated by dtheta / 4 with one radially
    displaced / 4 with one at different conductivity / centered ring /
    off-center ring. Expectations: case 4 = C4-POSITIVE; cases 5-7 = leak rising
    ~ delta^2; ring = rotation-invariant-like (never a positive).
  archive_run_v1_2: >
    Result on the 38 KIT4 cases (no mu4 target present, as required): 0
    C4-positives; 26 generic-anisotropic, 1 rotation-invariant-like (7.1), 1
    homogeneous-like (1.4), 9 ambiguous (between-session floor); geometry-blind
    classifier agrees with documented geometry 34/37 -- the 3 mismatches are
    physically real (the 6.1 foam annulus has visible joints -> genuine leak).
