# QGEO S_off on a REAL measured boundary operator (EIT) -- preregistered v1
# Frozen 2026-07-06 BEFORE any data pass (the KIT4 open EIT set is downloaded only
# after this file is committed in spirit; the mu4-POSITIVE configuration does not
# exist in the archive and is preregistered here as the decisive future measurement).
#
# FIREWALL: analog / instrument validation of the S_off observable -- NEVER external
# evidence for TFPT. evidence_class = internal_consistency, same basket as
# qc-recovery-kernel / quantum-testbed. A "hit" (a mu4-symmetric tank returning to the
# instrument floor) validates the OBSERVABLE, not the physics; a failure kills the
# analog CHANNEL, not the compiler.

target: >
  The seam premise QGEO.SYM.01, in its narrowest operator form (research contracts,
  v198/v201/v210): the boundary energy form (DtN/ND map) of a mu4-marked disk is
  block-diagonal in the four mu4 character classes {n = r mod 4}; Z3 or generic marks
  break it. Simulation side certified by theory-contracts/qgeo_soff_reconstruction.py
  (instrument requirement: relative spectral precision 1e-3 detects a mark shift of
  1e-3 rad). THIS experiment asks whether the statistic is measurable on a real
  laboratory boundary operator at all, and calibrates the real instrument floor.

observable: >
  From the KIT4 open 2D EIT archive (Zenodo 10.5281/zenodo.1203914; Hauptmann et al.
  arXiv:1704.01178; circular tank, 16 equidistant electrodes, 79 pairwise current
  injections, 1264 voltages per case): reconstruct the mean-free electrode
  Neumann-to-Dirichlet matrix R (least squares over all injections), transform to the
  16-electrode Fourier basis (16 = 4 classes x 4 modes -- the mu4 character classes are
  exact), and compute
    S_off = sum_{r != s} ||P_r R P_s||_F^2 / ||R||_F^2   (mean-free block)
  plus the clock commutator ||[rho, R]||/||R|| with rho = rotation by 4 electrodes
  (= pi/2, an exact permutation).

hypotheses:
  H1_floor: >
    Case 1.0 (homogeneous saline) is rotation-invariant, hence mu4-symmetric: S_off and
    the rho-commutator sit at the INSTRUMENT floor. The floor (electrode/contact
    variability + reciprocity error ||R - R^T||/||R||) is the measured analog of the
    sigma dial in qgeo_soff_reconstruction.py and is compared against the 1e-3
    requirement.
  H2_controls: >
    Every inclusion case (1.1-8.6, generic placements) must LEAK: S_off well above the
    homogeneous floor. The approximately annular cases (6.1, 8.1 foam rings) should sit
    between floor and generic (approximate rotation invariance).
  H3_mu4_positive (FUTURE MEASUREMENT, not in the archive): >
    Four IDENTICAL inclusions placed at j*pi/2 (same radius, same distance from center,
    aligned to electrodes 1/5/9/13) return S_off to the H1 floor while any single- or
    three-inclusion placement leaks -- the mu4 block-diagonality read on a real
    boundary operator. Decisive; any EIT lab with a KIT4-class system can run it.

kill_conditions:
  - "H1 fails (homogeneous tank leaks far above the reciprocity floor): the S_off
     observable is not realisable at KIT4-class precision -> analog channel
     data_limited/dead at this hardware class, not a TFPT statement."
  - "H2 fails (generic inclusions do NOT leak): the statistic has no discriminating
     power on real hardware -> channel dead."
  - "H3 (when measured) fails at demonstrated instrument precision: the mu4
     block-diagonality is not realisable in an analog boundary system -> the analog
     realisation path for QGEO.SYM.01 closes (the symbolic/numerical contracts stand)."

status_language: >
  Outcomes are typed consistent / data_limited / channel-dead only; never [E], never
  TFPT confirmation. The mu4-positive leg stays data_limited until H3 is measured.

