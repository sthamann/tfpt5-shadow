# v1.1 ADDENDUM (2026-07-06, AFTER the first data pass -- documented deviation,
# not a silent rewrite): the v1 H2 wording "every inclusion case must LEAK" was
# geometrically too coarse. The target photos show that the low-S_off inclusion
# cases (1.4, 7.1, 7.2, 8.x) are CENTERED or annular targets -- approximately
# rotation-invariant, hence correctly non-leaking (rotation invariance implies
# mu4 invariance; these are not false negatives). H2 is therefore evaluated on
# the ANISOTROPY-gated subset: cases whose off-circulant (rotation-breaking)
# weight exceeds 10x the homogeneous floor must leak with the generic isotropic
# signature (forbidden harmonic fraction ~ 12/15 = 0.8), and none may fake a
# mu4 positive (fraction -> floor). The decisive discriminator for H3 is
# unchanged: LARGE anisotropy with forbidden fraction at the floor.
addendum_v1_1:
  h2_refined: anisotropy-gated (>= 10x homogeneous off-circulant floor)
  reason: centered/annular targets are rotation-invariant-like -> no leak expected
  typed: documented post-data refinement (photos), on record

